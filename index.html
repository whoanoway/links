<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Link Maker</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #17181c;
        --muted: #616673;
        --line: #d9dde7;
        --red: #e62117;
        --red-dark: #bb1610;
        --teal: #00897b;
        --yellow: #f5bd1f;
        --shadow: 0 18px 55px rgba(22, 24, 32, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(rgba(23, 24, 28, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 24, 28, 0.035) 1px, transparent 1px),
          var(--bg);
        background-size: 28px 28px;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .tool {
        width: min(100%, 680px);
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .top {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
      }

      .mark {
        width: 48px;
        height: 34px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 7px;
        background: var(--red);
      }

      .mark::before {
        content: "";
        width: 0;
        height: 0;
        margin-left: 3px;
        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
        border-left: 15px solid #fff;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.65rem, 5vw, 2.35rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .destination {
        margin-bottom: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 7px;
        font: inherit;
      }

      input {
        width: 100%;
        padding: 0 42px 0 12px;
        color: var(--ink);
        border: 1px solid var(--line);
        background: #fff;
      }

      input {
        padding-right: 12px;
      }

      button {
        border: 0;
        padding: 0 16px;
        color: #fff;
        font-weight: 800;
        background: var(--red);
        cursor: pointer;
      }

      button:hover,
      button:focus-visible {
        background: var(--red-dark);
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(0, 137, 123, 0.35);
        outline-offset: 3px;
      }

      .preview {
        display: grid;
        grid-template-columns: 164px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
        margin-top: 18px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcff;
      }

      .thumbnail {
        aspect-ratio: 16 / 9;
        min-width: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 6px;
        background:
          linear-gradient(135deg, rgba(245, 189, 31, 0.9), rgba(0, 137, 123, 0.85)),
          linear-gradient(45deg, #222, #555);
      }

      .thumbnail.has-image {
        background-color: #111;
        background-position: center;
        background-size: cover;
      }

      .play {
        width: 50px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        background: rgba(230, 33, 23, 0.94);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      }

      .play::before {
        content: "";
        width: 0;
        height: 0;
        margin-left: 3px;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
        border-left: 13px solid #fff;
      }

      .result {
        min-width: 0;
      }

      .eyebrow {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      #previewLink {
        display: block;
        min-width: 0;
        color: var(--red-dark);
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
        font-size: clamp(0.83rem, 2.8vw, 1rem);
        line-height: 1.45;
        overflow-wrap: anywhere;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .actions button {
        color: var(--ink);
        border: 1px solid var(--line);
        background: #fff;
      }

      .actions button:hover,
      .actions button:focus-visible {
        border-color: var(--teal);
        background: rgba(0, 137, 123, 0.08);
      }

      #status {
        min-height: 22px;
        margin: 14px 0 0;
        color: var(--teal);
        font-size: 0.95rem;
        font-weight: 750;
      }

      #status.error {
        color: var(--red-dark);
      }

      @media (max-width: 560px) {
        main {
          padding: 14px;
        }

        .tool {
          padding: 16px;
        }

        .preview,
        .actions {
          grid-template-columns: 1fr;
        }

        .thumbnail {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="tool" aria-labelledby="title">
        <div class="top">
          <span class="mark" aria-hidden="true"></span>
          <h1 id="title">YouTube Link Maker</h1>
        </div>

        <div class="destination">
          <label>
            Destination video
            <input
              id="destination"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="https://www.youtube.com/watch?v=..."
            />
          </label>
        </div>

        <div class="destination">
          <label>
            Preview title
            <input
              id="previewTitle"
              type="text"
              autocomplete="off"
              value="Check this out"
              placeholder="Video title"
            />
          </label>
        </div>

        <div class="destination">
          <label>
            Preview thumbnail URL
            <input
              id="thumbnailUrl"
              type="url"
              autocomplete="off"
              spellcheck="false"
              placeholder="https://example.com/thumbnail.jpg"
            />
          </label>
        </div>

        <div class="preview">
          <div class="thumbnail" id="thumbnailPreview" aria-hidden="true">
            <span class="play"></span>
          </div>
          <div class="result">
            <span class="eyebrow">iMessage URL</span>
            <a id="previewLink" href="#" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>

        <div class="actions">
          <button id="copyShare" type="button">Copy iMessage link</button>
          <button id="openPreview" type="button">Open preview</button>
          <button id="copyYoutube" type="button">Copy YouTube link</button>
          <button id="copyMarkdown" type="button">Copy Markdown</button>
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script>
      const videoIdPattern = /^[A-Za-z0-9_-]{11}$/;
      const destinationInput = document.querySelector("#destination");
      const previewTitleInput = document.querySelector("#previewTitle");
      const thumbnailUrlInput = document.querySelector("#thumbnailUrl");
      const previewLink = document.querySelector("#previewLink");
      const thumbnailPreview = document.querySelector("#thumbnailPreview");
      const statusLine = document.querySelector("#status");
      let destinationUrl = "";
      let shareUrl = "";
      let cacheKey = Date.now().toString(36);

      function normalizeYouTubeUrl(value) {
        const trimmed = value.trim();
        if (videoIdPattern.test(trimmed)) {
          return `https://www.youtube.com/watch?v=${trimmed}`;
        }

        let parsedUrl;
        try {
          parsedUrl = new URL(trimmed);
        } catch {
          return "";
        }

        const host = parsedUrl.hostname.replace(/^www\./, "");
        let id = "";

        if (host === "youtu.be") {
          id = parsedUrl.pathname.split("/").filter(Boolean)[0] || "";
        } else if (host === "youtube.com" || host === "m.youtube.com") {
          if (parsedUrl.pathname === "/watch") {
            id = parsedUrl.searchParams.get("v") || "";
          } else {
            const parts = parsedUrl.pathname.split("/").filter(Boolean);
            if (["shorts", "embed", "live"].includes(parts[0])) {
              id = parts[1] || "";
            }
          }
        }

        return videoIdPattern.test(id) ? `https://www.youtube.com/watch?v=${id}` : "";
      }

      function normalizePublicUrl(value, requireHttps = false) {
        const trimmed = value.trim();
        if (!trimmed) return "";

        let parsedUrl;
        try {
          parsedUrl = new URL(trimmed);
        } catch {
          return "";
        }

        const isWebUrl = parsedUrl.protocol === "https:" || parsedUrl.protocol === "http:";
        if (!isWebUrl || (requireHttps && parsedUrl.protocol !== "https:")) return "";
        return parsedUrl.href;
      }

      function setStatus(message, isError = false) {
        statusLine.textContent = message;
        statusLine.classList.toggle("error", isError);
      }

      function refreshCacheKey() {
        cacheKey = Date.now().toString(36);
      }

      function syncDestination(showError = false) {
        destinationUrl = normalizeYouTubeUrl(destinationInput.value);
        if (!destinationUrl) {
          shareUrl = "";
          previewLink.textContent = "";
          previewLink.href = "#";
          setStatus(showError ? "Enter a valid YouTube link or video ID." : "", showError);
          return false;
        }
        updateShareUrl();
        setStatus("");
        return true;
      }

      function syncThumbnail(showError = false) {
        const rawValue = thumbnailUrlInput.value.trim();
        const thumbnailUrl = normalizePublicUrl(rawValue, true);

        if (!rawValue) {
          thumbnailPreview.style.backgroundImage = "";
          thumbnailPreview.classList.remove("has-image");
          return "";
        }

        if (!thumbnailUrl) {
          thumbnailPreview.style.backgroundImage = "";
          thumbnailPreview.classList.remove("has-image");
          setStatus(showError ? "Enter a public HTTPS thumbnail image URL." : "", showError);
          return "";
        }

        thumbnailPreview.style.backgroundImage = `url("${thumbnailUrl.replace(/["\\]/g, "\\$&")}")`;
        thumbnailPreview.classList.add("has-image");
        setStatus("");
        return thumbnailUrl;
      }

      function getPreviewTitle() {
        return previewTitleInput.value.trim() || "Video preview";
      }

      function getThumbnailUrl(showError = false) {
        const thumbnailUrl = syncThumbnail(showError);
        if (!thumbnailUrl && showError) {
          setStatus("Enter a public HTTPS thumbnail image URL.", true);
        }
        return thumbnailUrl;
      }

      function updateShareUrl() {
        if (!destinationUrl) {
          shareUrl = "";
          previewLink.textContent = "";
          previewLink.href = "#";
          return "";
        }

        const url = new URL("/v", window.location.origin);
        url.searchParams.set("u", destinationUrl);
        url.searchParams.set("title", getPreviewTitle());

        const thumbnailUrl = normalizePublicUrl(thumbnailUrlInput.value, true);
        if (thumbnailUrl) {
          url.searchParams.set("image", thumbnailUrl);
        }

        url.searchParams.set("cb", cacheKey);
        shareUrl = url.href;
        previewLink.textContent = shareUrl;
        previewLink.href = shareUrl;
        return shareUrl;
      }

      function fallbackCopy(text) {
        const field = document.createElement("textarea");
        field.value = text;
        field.setAttribute("readonly", "");
        field.style.position = "fixed";
        field.style.top = "-1000px";
        document.body.appendChild(field);
        field.select();
        document.execCommand("copy");
        field.remove();
      }

      async function copyText(text, message) {
        if (!syncDestination(true)) return;

        try {
          await navigator.clipboard.writeText(text);
        } catch {
          fallbackCopy(text);
        }
        setStatus(message);
      }

      function getValidShareUrl(showError = false) {
        if (!syncDestination(showError)) return "";
        if (!getThumbnailUrl(showError)) return "";
        return updateShareUrl();
      }

      document.querySelector("#copyShare").addEventListener("click", () => {
        refreshCacheKey();
        const validShareUrl = getValidShareUrl(true);
        if (!validShareUrl) return;
        copyText(validShareUrl, "Copied iMessage link.");
      });
      document.querySelector("#openPreview").addEventListener("click", () => {
        refreshCacheKey();
        const validShareUrl = getValidShareUrl(true);
        if (!validShareUrl) return;
        window.open(validShareUrl, "_blank", "noopener,noreferrer");
      });
      document.querySelector("#copyYoutube").addEventListener("click", () => {
        if (!syncDestination(true)) return;
        copyText(destinationUrl, "Copied YouTube link.");
      });
      document.querySelector("#copyMarkdown").addEventListener("click", () => {
        refreshCacheKey();
        const validShareUrl = getValidShareUrl(true);
        if (!validShareUrl) return;
        copyText(`[${getPreviewTitle()}](${validShareUrl})`, "Copied Markdown link.");
      });
      destinationInput.addEventListener("input", () => {
        refreshCacheKey();
        syncDestination(Boolean(destinationInput.value.trim()));
      });
      previewTitleInput.addEventListener("input", () => {
        refreshCacheKey();
        updateShareUrl();
      });
      thumbnailUrlInput.addEventListener("input", () => {
        refreshCacheKey();
        syncThumbnail(Boolean(thumbnailUrlInput.value.trim()));
        updateShareUrl();
      });

      syncDestination();
    </script>
  </body>
</html>
